repos:
  - repo: local
    hooks:
      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c 'cd frontend && npm run format:check'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: backend-ruff-check
        name: backend ruff check
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: backend-ruff-format
        name: backend ruff format
        entry: bash -c 'cd backend && uv run ruff format --check .'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-build
        name: frontend build
        entry: bash -c 'cd frontend && npm run build'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: backend-tests
        name: backend tests
        entry: bash -c 'cd backend && uv run pytest'
        language: system
        pass_filenames: false
        stages: [pre-push]
